<!DOCTYPE html>
<html>

<head>

<title>ERP Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6fb;
}

.login-box{
    width:400px;
    margin:auto;
    margin-top:100px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

.btn-purple{
    background:#5B3FD4;
    color:white;
}

</style>

</head>

<body>

<div class="login-box">

<h2 class="text-center mb-4">
PINGAX INDUSTRIES
</h2>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
name="username"
class="form-control">

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button class="btn btn-purple w-100">

Login

</button>

</form>

</div>

</body>

</html>
